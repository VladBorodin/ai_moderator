{% extends "base.html" %}

{% block content %}
<div class="card">
	<div class="card-header card-header-row">
		<div>
			<h3>Журнал проверок</h3>
			<p>Последние запросы к `/moderation/check`.</p>
		</div>

		<button class="secondary-button" id="refreshLogsButton">Обновить</button>
	</div>

	<div id="logsEmptyState" class="empty-state">
		<div class="empty-icon">☷</div>
		<div>Журнал пока пуст</div>
		<span>Сначала выполни тестовую проверку сообщения.</span>
	</div>

	<div id="logsTableWrap" class="table-wrap hidden">
		<table class="data-table">
			<thead>
				<tr>
					<th>Source</th>
					<th>Chat</th>
					<th>User</th>
					<th>Message</th>
					<th>Verdict</th>
					<th>Level</th>
					<th>Description</th>
				</tr>
			</thead>
			<tbody id="logsTableBody"></tbody>
		</table>
	</div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/moderation_logs.js"></script>
{% endblock %}
